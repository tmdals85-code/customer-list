<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손해사정 고객관리 시스템</title>
    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8; --border-color: #334155; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 1600px; background: var(--bg-card); border-radius: 15px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to right, #1e3a8a, #172554); }
        h1 { margin: 0; color: white; font-size: 18px; font-weight: 700; }
        .search-box { background: rgba(255, 255, 255, 0.1); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); color: white; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; outline: none; margin-left: 5px; font-size: 14px; width: 150px; }
        .table-wrapper { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        th { background: #172554; color: #93c5fd; position: sticky; top: 0; z-index: 10; }
        td { color: var(--text-sub); }
        .client-name { font-weight: 700; color: var(--text-main); }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; display: inline-block; border: 1px solid #475569; }
        .status-green { background: rgba(16, 185, 129, 0.2); color: #34d399; border-color: #059669; }
        .status-purple { background: rgba(139, 92, 246, 0.2); color: #a78bfa; border-color: #7c3aed; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .refresh-btn { background: #2563eb; border: none; color: white; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div style="display:flex; align-items:center;">
                <h1>고객관리 리스트</h1>
                <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
            </div>
            <div class="search-box">
                🔍 <input type="text" id="searchInput" placeholder="고객명 검색..." onkeyup="filterTable()">
            </div>
        </header>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:40px; text-align:center;">No.</th>
                        <th>고객명</th><th>수임일자</th><th>보험사명</th><th>사고유형</th>
                        <th>수수료(%)</th><th>진단명</th><th>수임료</th><th>소개자</th>
                        <th>종결일자</th><th>기타사항</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="11" class="loading">데이터 동기화 중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdmdt6rLhJnOmtsbsa2QxFn_V2pajo9SW9tIM0cIhMaErObcuE56UF9F--hYV4e4nbzX_5bSIrTxjb/pub?gid=0&single=true&output=csv";

        window.onload = loadData;

        async function loadData() {
            const tbody = document.getElementById('tableBody');
            const timestamp = new Date().getTime();
            // 가장 안정적인 corsproxy.io 사용
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(SHEET_URL + "&t=" + timestamp)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.text();
                const rows = parseCSV(data);
                
                // 수임일자(Index 1) 기준 내림차순 정렬 (데이터가 있을 때만)
                rows.sort((a, b) => {
                    if(!a[1] || a[1] === '-') return 1;
                    if(!b[1] || b[1] === '-') return -1;
                    return new Date(b[1]) - new Date(a[1]);
                });

                renderTable(rows);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="11" class="loading" style="color:#ff6b6b">❌ 연결 오류: 새로고침을 눌러보세요.</td></tr>`;
            }
        }

        // [수정된 부분] 빈 칸을 정확하게 인식하는 CSV 파서
        function parseCSV(csv) {
            const rows = [];
            const lines = csv.trim().split(/\r?\n/);
            
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i];
                if (!line) continue;

                let cells = [];
                let current = '';
                let inQuotes = false;

                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        cells.push(current.trim());
                        current = '';
                    } else current += char;
                }
                cells.push(current.trim());
                rows.push(cells);
            }
            return rows;
        }

        function renderTable(rows) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            rows.forEach((row, index) => {
                const tr = document.createElement('tr');
                let html = `<td class="row-number">${index + 1}</td>`;
                
                // 시트의 A열(0)부터 J열(9)까지 순서대로 매칭
                for (let i = 0; i < 10; i++) {
                    let text = row[i] ? row[i] : '-';
                    if (i === 0) text = `<span class="client-name">${text}</span>`;
                    
                    // 수수료나 진행상태 강조
                    if (['완료', '입금', '종결'].some(k => text.includes(k))) {
                        text = `<span class="badge status-green">${text}</span>`;
                    } else if (['진행', '조사', '청구', '산재', '교통사고'].some(k => text.includes(k))) {
                        text = `<span class="badge status-purple">${text}</span>`;
                    }
                    html += `<td>${text}</td>`;
                }
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const filter = document.getElementById("searchInput").value.toUpperCase();
            const trs = document.getElementById("tableBody").getElementsByTagName("tr");
            for (const tr of trs) {
                const td = tr.getElementsByTagName("td")[1];
                if (td) {
                    const txt = td.textContent || td.innerText;
                    tr.style.display = txt.toUpperCase().includes(filter) ? "" : "none";
                }
            }
        }
    </script>
</body>
</html>
